services:

  postgres:
    image: pgvector/pgvector:pg16

    container_name: moodflix_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moodflix

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: moodflix_api

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

volumes:
  postgres_data: